<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D1D1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#grad)" rx="80" />
  <circle cx="200" cy="200" r="120" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="20,10" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite" />
  </circle>
  <text x="50%" y="55%" text-anchor="middle" font-family="monospace" font-size="60" fill="#FFFFFF" font-weight="bold" filter="url(#glow)">NULLCOVE</text>
  <path d="M100 300 L300 300" stroke="#00D1D1" stroke-width="2" stroke-dasharray="5,5" />
</svg>
